<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fontanelle a Palermo</title>
    <script type="module" crossorigin src="/fontanelle_pa/assets/index-BncxbelZ.js"></script>
    <link rel="stylesheet" crossorigin href="/fontanelle_pa/assets/index-B-nVY7Wj.css">
  <link rel="manifest" href="/fontanelle_pa/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/fontanelle_pa/registerSW.js"></script></head>
  <body>
    <div id="app">
      <div id="map">
        <div id="map-legends">
          <div id="isochrone-legend" class="map-legend">
            <div class="legend-item"><span class="legend-swatch" style="background: #6baed6"></span>Isocrona 5 min</div>
            <div class="legend-item"><span class="legend-swatch" style="background: #fc9474"></span>Isocrona 10 min</div>
          </div>
          <div id="copertura-legend" class="map-legend" hidden></div>
        </div>
      </div>
      <aside id="panel">
        <nav id="panel-tabs">
          <button data-tab="fontanelle" class="active">Fontanelle</button>
          <button data-tab="filtri">Filtri</button>
          <button data-tab="statistiche">Statistiche</button>
          <button data-tab="info">Info</button>
        </nav>
        <div id="panel-content">
          <div id="filter-panel">
            <label for="filter-circoscrizione">Circoscrizione</label>
            <select id="filter-circoscrizione"><option value="">Tutte</option></select>
            <label for="filter-quartiere">Quartiere</label>
            <select id="filter-quartiere"><option value="">Tutti</option></select>
            <label for="filter-search">Cerca indirizzo</label>
            <input id="filter-search" type="search" placeholder="es. Via Roma" />
            <label for="filter-fontanella">Fontanella</label>
            <select id="filter-fontanella"><option value="">Tutte</option></select>
          </div>
          <div id="isochrone-toggles">
            <label><input type="checkbox" data-isochrone-toggle="5" checked /> Isocrone 5 min</label>
            <label><input type="checkbox" data-isochrone-toggle="10" checked /> Isocrone 10 min</label>
            <label><input type="checkbox" data-copertura-toggle="5" /> Copertura 5 min</label>
            <label><input type="checkbox" data-copertura-toggle="10" /> Copertura 10 min</label>
          </div>
          <button id="locate-nearest">Trova la fontanella più vicina</button>
        </div>
      </aside>
    </div>
  </body>
</html>
